name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install with offline tree-sitter grammars
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,treesitter-grammars]"

      - name: Run test suite (incl. live tree-sitter extraction)
        run: pytest -q

      - name: Smoke-test the CLI end-to-end
        run: |
          python -m lattice src -f json mermaid --communities --serial -o /tmp/lattice
          test -s /tmp/lattice.graph.json
          test -s /tmp/lattice.graph.mmd
